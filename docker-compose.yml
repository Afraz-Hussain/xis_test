version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: xis_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: xis_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: xis_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: